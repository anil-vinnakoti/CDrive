AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CDrive Backend Infrastructure
  Multi-environment (dev / prod) AWS SAM Template provisioning DynamoDB, S3 Bucket,
  HTTP API Gateway, and Go Lambda Function.

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment stage name (dev or prod)

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        STAGE: !Ref Stage
        TABLE_NAME: !Ref CustomDriveData
        BUCKET_NAME: !Ref CDriveFileStorage
        GSI_FOLDER_INDEX: FolderIdIndex

Resources:
  # ==========================================================
  # 1. DynamoDB Single-Table (Environment Isolated)
  # ==========================================================
  CustomDriveData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CustomDriveData-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: FolderID
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: FolderIdIndex
          KeySchema:
            - AttributeName: FolderID
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ==========================================================
  # 2. S3 Bucket for File Storage (Globally Unique per Stage)
  # ==========================================================
  CDriveFileStorage:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cdrive-file-storage-${Stage}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacierInstantRetrieval30Days
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER_IR

  # ==========================================================
  # 3. S3 Bucket for UI Hosting
  # ==========================================================
  CDriveUiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cdrive-ui-hosting-${Stage}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: 404.html

  CDriveUiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CDriveUiBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "arn:aws:s3:::${CDriveUiBucket}/*"

  # ==========================================================
  # 4. CloudFront Distribution for UI CDN
  # ==========================================================
  CDriveUiCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "CDrive Web UI CDN (${Stage})"
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt CDriveUiBucket.RegionalDomainName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

  # ==========================================================
  # 5. HTTP API Gateway (v2)
  # ==========================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "CDriveHttpApi-${Stage}"
      CorsConfiguration:
        AllowHeaders:
          - '*'
        AllowMethods:
          - '*'
        AllowOrigins:
          - '*'

  # ==========================================================
  # 6. Go Lambda Function
  # ==========================================================
  CDriveApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ./
      Handler: bootstrap
      Runtime: provided.al2023
      Description: !Sub "Go Lambda handler for CDrive API (${Stage})"
      Policies:
        # DynamoDB Permissions
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomDriveData
        # S3 Permissions for Direct Browser Upload & Download
        - S3CrudPolicy:
            BucketName: !Ref CDriveFileStorage
      Events:
        RootApiRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        ProxyApiRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  EnvironmentStage:
    Description: Active Environment Stage
    Value: !Ref Stage
  HttpApiEndpoint:
    Description: HTTP API Gateway Endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  DynamoDBTableName:
    Description: DynamoDB Table Name
    Value: !Ref CustomDriveData
  S3BucketName:
    Description: S3 Storage Bucket Name
    Value: !Ref CDriveFileStorage
  UiHostingBucketName:
    Description: S3 Bucket Name for UI Hosting
    Value: !Ref CDriveUiBucket
  UiWebsiteUrl:
    Description: S3 Static Website URL for UI
    Value: !GetAtt CDriveUiBucket.WebsiteURL
  UiCloudFrontUrl:
    Description: CloudFront CDN HTTPS URL for CDrive UI
    Value: !Sub "https://${CDriveUiCloudFront.DomainName}"
  CDriveFunctionArn:
    Description: CDrive API Lambda Function ARN
    Value: !GetAtt CDriveApiFunction.Arn
